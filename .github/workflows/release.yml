name: Build & Release VSIX

on:
  push:
    tags:
      - 'v*'           # triggers on tags like v0.6.0, v0.7.0, etc.
  workflow_dispatch:   # also allow manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for creating releases
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --allow-missing-repository

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sftp-folder-diff-vsix
          path: '*.vsix'

      - name: Create GitHub Release (only for tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          body: |
            Install with:
            ```
            code --install-extension sftp-folder-diff-*.vsix
            ```
            See [CHANGELOG.md](./CHANGELOG.md) for what's new.
